spring:
  application:
    name: ai-java-create-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_java_penguin
    username: root
    password: 1234
server:
  port: 8080
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: org.example.aijavacreate.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
