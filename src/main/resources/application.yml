spring:
  application:
    name: ai-java-create-backend
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_java_penguin
    username: root
    password: 1234
  #Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
  profiles:
    active: local
server:
  port: 8080
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: org.example.aijavacreate.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
